name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test
    runs-on: self-hosted
    env:
      CARGO_HOME: /cache/cargo
      CARGO_TARGET_DIR: /cache/cargo-target/decent-cloud
      RUSTUP_HOME: /cache/cargo/rustup
    steps:
      - uses: actions/checkout@v4
      - run: cargo make all
      - run: cargo sweep --time 14 --installed
